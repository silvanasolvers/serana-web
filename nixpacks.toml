[phases.setup]
nixPkgs = ["nodejs_20", "python3"]

[phases.install]
cmds = ["rm -rf node_modules package-lock.json && npm install --force"]

[phases.build]
cmds = ["npm run build"]

[start]
# Express server: serves the built dist/ + the /api/checkout/mp/* and
# /api/webhooks/mercadopago endpoints needed for the Mercado Pago flow.
cmd = "npm start"
